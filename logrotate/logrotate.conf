# Static logrotate config for the logrotate container. Globs are non-recursive and
# exclude already-rotated files (.gz/.N), or copytruncate would re-rotate archives.
# copytruncate is mandatory: fluent-bit holds the inode open on tail; a rename would
# detach it until Rotate_Wait + rescan.

nomail

# mariadb — slowlog/error in /var/log/mysql_logs.
/var/log/mysql_logs/*.log {
    su root root
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

# NDJSON read by the fluent-bit tail input.
/var/log/json/*.ndjson {
    su root root
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
