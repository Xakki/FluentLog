# gl.auto — log_format with no specialized parser (see route_unknown in cleanup.lua).
# JSON is already handled globally by json_default; here we only join native
# multi-line output with the same json-safe php parser.
#
# Caveat: gl.auto is one shared buffer for all unmarked services, so lines from
# different containers can theoretically cross-merge. Set an explicit log_format
# label to route a noisy service to its own tag.
[FILTER]
    Name                  multiline
    Match                 gl.auto
    multiline.parser      php
    multiline.key_content log
    mode                  parser
    buffer                on
    flush_ms              1000
    emitter_name          re_auto_ml
    emitter_storage.type  memory
