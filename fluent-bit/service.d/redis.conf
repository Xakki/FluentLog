# gl.redis — KeyDB/Redis: "1:M 30 Apr 2026 12:34:56.789 # message".
# Non-standard lines (ASCII-art logo, etc.) pass through unchanged. Noise is
# trimmed at the source (loglevel warning), so no grep here.
[FILTER]
    Name         parser
    Match        gl.redis
    Key_Name     log
    Parser       keydb
    Reserve_Data On
