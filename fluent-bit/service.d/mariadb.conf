# gl.mariadb — error log (stderr). Match is strictly "gl.mariadb": slowlog arrives
# as gl.mariadb-slowlog (already multiline-joined on its tail input).

# Join stack traces / multi-line InnoDB messages.
[FILTER]
    Name                  multiline
    Match                 gl.mariadb
    Multiline.Parser      mysql
    Multiline.Key_Content log

# "2026-04-30 12:34:56 0 [Note] ...". Slowlog wouldn't match (passes through).
[FILTER]
    Name         parser
    Match        gl.mariadb
    Key_Name     log
    Parser       mariadb_record
    Reserve_Data On

# datetime -> datetime_raw: its "YYYY-MM-DD H:MM:SS" form isn't a valid OpenSearch
# date and would break the bulk insert. GELF timestamp stays the receive time.
[FILTER]
    Name      modify
    Match     gl.mariadb
    Rename    datetime datetime_raw

# Slowlog tail has no docker labels — add the canonical docker_* fields.
[FILTER]
    Name   lua
    Match  gl.mariadb-slowlog
    script /fluent-bit/etc/cleanup.lua
    call   enrich_mariadb_tail
