# =========================================================
# gl.php — per-type фильтр: отрезание php-fpm шума у источника
# =========================================================
# php-fpm шум, режем у источника:
#   1) lifecycle NOTICE: "ready to handle connections", "fpm is running",
#      запуск/остановка воркеров pool ("child N exited", "child N started")
#      — нормальная работа pool manager, не observability.
#   2) master worker-recycle артефакт на современном Linux: "unable to read
#      what child N said into stdout/stderr: Bad file descriptor" и
#      "epoll: unable to (remove|add) fd: Bad file descriptor (9)". Бенайн,
#      на запросы не влияет.
# Узкий паттерн: настоящие FPM-ERROR (e.g. "unable to bind listening socket")
# НЕ подпадают.
[FILTER]
    Name    grep
    Match   gl.php
    Exclude log (NOTICE: (ready to handle connections|fpm is running|\[pool www\] child \d+ (started|exited))|unable to read what child \d+ said into std(out|err): Bad file descriptor|epoll: unable to (remove|add) fd: Bad file descriptor)

# =========================================================
# FILTERS — склейка многострочного PHP-вывода (ДО json-парсера)
# =========================================================
# Docker fluentd-driver разбивает stderr по \n — каждая строка приходит
# отдельным forward-событием. PHP Fatal/Uncaught + Stack trace и вывод
# dd()/dump() (var-dumper) при этом рассыпались на N отдельных GELF-сообщений
# с пустым short_message. multiline-фильтр (buffer on — обязателен, т.к. строки
# в разных chunk'ах) собирает их обратно в одну запись по правилам
# [MULTILINE_PARSER] php (parsers.conf). Только gl.php (легаси wep + symfony +
# cron). Размещён ПОСЛЕ rewrite_tag (тег gl.php уже есть) и СТРОГО ДО json_default:
# single-line JSON (Monolog) проходит как отдельная запись (он — START, не CONT)
# и нормально парсится ниже. re-emit идёт с тем же тегом gl.php, но фильтр не
# реобрабатывает собственный вывод — петли нет.
[FILTER]
    Name                  multiline
    Match                 gl.php
    multiline.parser      php
    multiline.key_content log
    mode                  parser
    buffer                on
    flush_ms              1000
    emitter_name          re_php_ml
    emitter_storage.type  memory
