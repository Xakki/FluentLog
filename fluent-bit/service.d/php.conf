# gl.php — drop php-fpm pool/lifecycle noise (not observability). The pattern is
# narrow so real FPM errors (e.g. "unable to bind listening socket") pass through.
[FILTER]
    Name    grep
    Match   gl.php
    Exclude log (NOTICE: (ready to handle connections|fpm is running|\[pool www\] child \d+ (started|exited))|unable to read what child \d+ said into std(out|err): Bad file descriptor|epoll: unable to (remove|add) fd: Bad file descriptor)

# Join multi-line PHP output (Fatal/Uncaught + Stack trace, dd()/dump()) back into
# one record via the php multiline parser. Runs after json_default (see fluent-bit.conf):
# safe for PHP — native lines aren't JSON so "log" survives for joining, and single-line
# Monolog JSON is a START line that isn't joined. buffer on is required (lines span chunks).
[FILTER]
    Name                  multiline
    Match                 gl.php
    multiline.parser      php
    multiline.key_content log
    mode                  parser
    buffer                on
    flush_ms              1000
    emitter_name          re_php_ml
    emitter_storage.type  memory
