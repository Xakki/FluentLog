# gl.nginx — access JSON + error text.

# Access JSON: split "message" ("GET /uri HTTP/1.1") into method/uri/proto.
[FILTER]
    Name         parser
    Match        gl.nginx
    Key_Name     message
    Parser       nginx_request
    Reserve_Data On

# Error text: "2024/12/30 12:34:56 [error] 1234#0: *5678 message". No-op on access
# JSON (its "log" is already gone).
[FILTER]
    Name         parser
    Match        gl.nginx
    Key_Name     log
    Parser       nginx_error
    Reserve_Data On

# Split the error "tail" (", client: ..., request: \"...\", ...") into fields.
[FILTER]
    Name   lua
    Match  gl.nginx
    script /fluent-bit/etc/cleanup.lua
    call   parse_nginx_error_context
