# Docker / file logs -> fluent-bit -> Graylog (GELF). See README.md for the pipeline.

[SERVICE]
    Flush        3
    Log_Level    warn
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Parsers_File parsers.conf

# =========================================================
# INPUTS
# =========================================================

# Docker fluentd-driver. Tag "service.<container>" is only the input namespace;
# ROUTING below rewrites it to gl.<log_format>.
[INPUT]
    Name    forward
    Listen  0.0.0.0
    Port    24224

# fluent-bit's own metrics (separate pipeline; filters don't apply) -> :2021 output.
[INPUT]
    Name            fluentbit_metrics
    Tag             internal_metrics
    Scrape_Interval 5

# MariaDB slowlog (mysqld can't write it to stderr). Own tag gl.mariadb-slowlog.
[INPUT]
    Name             tail
    Path             /var/log/mysql_logs/*slow*.log
    Tag              gl.mariadb-slowlog
    Read_from_Head   False
    Multiline.Parser mysql
    DB               /var/lib/fluent-bit/mariadb_tail.db
    Rotate_Wait      5
    Buffer_Chunk_Size 64k
    Buffer_Max_Size   1M
    Skip_Long_Lines   On

# Universal NDJSON tail: any /var/log/json/*.ndjson is picked up; filename = service.
# Buffer_* raised: NDJSON with a stack trace exceeds the default 32k and the whole
# file would be skipped ("lines are too long").
[INPUT]
    Name             tail
    Path             /var/log/json/*.ndjson
    Path_Key         file
    Tag              gl.jsonfile.*
    Read_from_Head   False
    Parser           json_default
    DB               /var/lib/fluent-bit/json_tail.db
    Rotate_Wait      5
    Buffer_Chunk_Size 64k
    Buffer_Max_Size   1M
    Skip_Long_Lines   On

# =========================================================
# FILTERS — host-level fields on every record
# =========================================================
# host is mandatory: without it the GELF encoder uses the fluent-bit container's
# bridge IP. Set from this container's env so it works for docker- and tail-inputs.
[FILTER]
    Name   modify
    Match  *
    Add    host ${HOST_IP}
    Add    hostname ${HOST_NAME}
    Add    docker_profile ${COMPOSE_PROFILES}

[FILTER]
    Name   lua
    Match  gl.jsonfile.*
    script /fluent-bit/etc/cleanup.lua
    call   enrich_jsonfile

# =========================================================
# FILTERS — docker driver metadata -> flat docker_* fields
# =========================================================
# Driver forwards labels under their original names (docker v20+). Copy is
# only-if-absent, so an explicit log_format label overrides the docker_service
# default; it must run after Rename docker_service.
[FILTER]
    Name   modify
    Match  service.*
    Rename source                            log_source
    Rename container_name                    docker_container
    Rename com.docker.compose.service        docker_service
    Rename com.docker.compose.project        docker_project
    Rename com.docker.compose.image          docker_image
    Rename tier                              docker_tier
    Copy docker_service                      log_format

[FILTER]
    Name   lua
    Match  service.*
    script /fluent-bit/etc/cleanup.lua
    call   strip_container_name

# =========================================================
# ROUTING — tag by log_format
# =========================================================
# route_unknown maps any log_format without a service.d/<fmt>.conf to "auto"; must
# run before rewrite_tag. rewrite_tag moves service.* -> gl.<log_format>; no loop
# (gl.* isn't matched by service.*), tail inputs already arrive as gl.*.
[FILTER]
    Name   lua
    Match  service.*
    script /fluent-bit/etc/cleanup.lua
    call   route_unknown

[FILTER]
    Name          rewrite_tag
    Match         service.*
    Rule          $container_id ^.+$ gl.$log_format false
    Emitter_Name  re_kind

# =========================================================
# FILTERS — JSON body (global auto-detect)
# =========================================================
# Non-JSON lines (php-fpm NOTICE, raw stderr, MySQL multi-line) are passed through
# silently with "log" intact.
[FILTER]
    Name         parser
    Match        gl.*
    Key_Name     log
    Parser       json_default
    Reserve_Data On

# "log" still present => the line wasn't JSON: mark it native.
[FILTER]
    Name   lua
    Match  gl.*
    script /fluent-bit/etc/cleanup.lua
    call   tag_native_stderr

# =========================================================
# PER-TYPE FILTERS — service.d/<log_format>.conf
# =========================================================
# Runs AFTER json_default by design: nginx.conf needs the expanded access-JSON
# "message". Matches are disjoint (one gl.<fmt> each), so include order is irrelevant.
@INCLUDE service.d/*.conf

# =========================================================
# FILTERS — level, timestamp, GELF flattening (all records)
# =========================================================
[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   infer_level

[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   normalize_event_time

[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   flatten_nested

# =========================================================
# OUTPUT
# =========================================================

[OUTPUT]
    Name             http
    Match            gl.*
    Host             ${GRAYLOG_HOST}
    Port             ${GRAYLOG_PORT}
    URI              ${GRAYLOG_URI}
    Format           gelf
    # GELF.level holds syslog severity (0..7); the Monolog scale stays in level_php.
    Gelf_Level_Key   syslog_severity
    tls              On
    tls.verify       On
    Retry_Limit      5

# internal_metrics in Prometheus format; nginx proxies to :2021 (not published).
[OUTPUT]
    Name   prometheus_exporter
    Match  internal_metrics
    Host   0.0.0.0
    Port   2021

