# Parsers and multiline parsers. Source "datetime" fields are NOT used as Time_Key:
# they carry no TZ, so fluent-bit would read them as UTC and shift records into the
# future. Event time is derived later in normalize_event_time (cleanup.lua).

[PARSER]
    Name         json_default
    Format       json

# Nginx error: "2024/12/30 12:34:56 [error] 1234#0: *5678 message".
[PARSER]
    Name         nginx_error
    Format       regex
    Regex        ^(?<datetime>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?<level_str>[a-z]+)\] (?<pid>\d+)#(?<tid>\d+):(?: \*(?<connection_id>\d+))?\s*(?<message>.*)$

# KeyDB / Redis: "1:M 30 Apr 2026 12:34:56.789 # message" (tid present on KeyDB).
# role: X sentinel | C rdb child | S replica | M master. level: # warn | * notice | - verbose | . debug.
[PARSER]
    Name         keydb
    Format       regex
    Regex        ^(?<pid>\d+):(?:(?<tid>\d+):)?(?<role>[A-Z]) (?<datetime>\d{1,2} \w+ \d{4} \d{2}:\d{2}:\d{2}\.\d{3}) (?<level_char>[#\*\.\-]) (?<message>.*)$

# MariaDB error (after multiline join): "2026-04-30 12:34:56 0 [Note] ...".
[PARSER]
    Name         mariadb_record
    Format       regex
    Regex        ^(?<datetime>\d{4}-\d{2}-\d{2}\s+\d{1,2}:\d{2}:\d{2})\s+(?<thread>\d+)?\s*\[(?<level_str>\w+)\]\s+(?<message>.*)$

# Nginx access JSON "request" -> method/uri/proto. On mismatch the original is kept.
[PARSER]
    Name         nginx_request
    Format       regex
    Regex        ^(?<request_method>[A-Z]+) (?<request_uri>\S+) (?<request_proto>HTTP/[\d\.]+)$

# MariaDB multiline: a new record starts with a year or "Time: <year>".
[MULTILINE_PARSER]
    Name          mysql
    Type          regex
    Flush_timeout 1000
    Rule      "start_state"   "^(20\d{2}\-|Time: \d{4})"   "cont"
    Rule      "cont"          "^(?!20\d{2}\-|Time: \d{4})" "cont"

# PHP multiline: no reliable timestamp anchor, so the rule is inverted — only
# CONTINUATION lines are described (indented body / "#N" trace frames /
# "Stack trace:" / closing bracket); everything else starts a new record. This
# keeps single-line JSON (Monolog) and LineFormatter intact while joining
# Fatal/Uncaught + Stack trace and dd()/dump() output.
[MULTILINE_PARSER]
    Name          php
    Type          regex
    Flush_timeout 1000
    Rule      "start_state"   "^(?!\s|#\d|Stack trace:|[\]\})]).*"   "cont"
    Rule      "cont"          "^(\s|#\d|Stack trace:|[\]\})]).*"     "cont"
