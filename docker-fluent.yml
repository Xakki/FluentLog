    fluent-bit:
        image: cr.fluentbit.io/fluent/fluent-bit:latest
        container_name: "${COMPOSE_PROJECT_NAME}-fluent-bit"
        ports:
            - "${EXT_FLUENT_PORT}:24224/udp"
            - "${EXT_FLUENT_PORT}:24224/tcp"
            - "${EXT_FLUENT_METRIC_PORT}:2020" # Metrics port
        volumes:
            - ./fluent-bit:/fluent-bit/etc:ro
            # Универсальный JSON-tail: любые *.ndjson файлы здесь подхватываются
            # автоматически. Имя файла = имя сервиса (см. enrich_jsonfile).
            # Bind точки конкретных сервисов в base/_json_logs/<service>.ndjson
            # из соответствующих контейнеров (или общий host-каталог).
            - ${JSON_LOG_PATH}:/var/log/json:ro
            # MariaDB slowlog (mysqld не умеет slowlog в stderr — только файл).
            - ${MYSQL_SLOWLOG_PATH}:/var/log/mysql_logs:ro
            - fluent_bit_state:/var/lib/fluent-bit
        environment:
            - TZ=${TZ}
            - GRAYLOG_HOST=${GRAYLOG_HOST}
            - GRAYLOG_URI=${GRAYLOG_URI}
            - GRAYLOG_PORT=${GRAYLOG_PORT}
            - HOST_NAME=${HOST_NAME}
            - HOST_IP=${HOST_IP}
            - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
            - COMPOSE_PROFILES=${COMPOSE_PROFILES}
        restart: unless-stopped
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "3"
        mem_limit: "128M"
        cpus: "0.3"

    logrotate:
        image: blacklabelops/logrotate
        container_name: "${COMPOSE_PROJECT_NAME}-logrotate"
        volumes:
            - ${MYSQL_SLOWLOG_PATH}:/var/log/mysql_logs
            - ${JSON_LOG_PATH}:/var/log/json
            - ./logrotate/logrotate.conf:/etc/logrotate.app.conf:ro
        entrypoint: /bin/sh
        command:
            - -c
            # bind-mounted :ro конфиг наследует host-владельца (uid != 0) →
            # logrotate отказывается его читать («file owner is wrong»).
            # install(1) делает копию в root-owned путь один раз на старте контейнера
            # — после правок конфига нужен restart-logrotate
            - install -m 0644 -o root -g root /etc/logrotate.app.conf /tmp/logrotate.app.conf
                && exec /usr/bin/go-cron "@daily" /usr/sbin/logrotate --state=/logrotate-status/logrotate.status /tmp/logrotate.app.conf
        restart: unless-stopped
        labels:
            tier: "helper"
        <<: *_logging
        depends_on:
            fluent-bit:
                condition: service_started
        mem_limit: "64M"
        cpus: "0.1"

volumes:
    fluent_bit_state:
